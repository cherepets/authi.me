<!DOCTYPE html>
<html lang="en">
<head>
    <title>Authi | Login</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: white;
            color: black;
            margin: 0;
            padding: 2rem;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            background: white;
            border: 1px solid black;
            color: black;
            padding: 0.75rem;
            font: inherit;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: black;
            border: 1px solid black;
            color: white;
            font: inherit;
            cursor: pointer;
        }

        .login-card {
            width: 100%;
            max-width: 360px;
        }

        .form-group {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Login</h1>

        <form id="login-form">
            <div class="form-group">
                <label for="username">User</label><br>
                <input type="text" id="username" autocomplete="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label><br>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>

            <div class="form-group">
                <label for="totp">TOTP</label><br>
                <input type="text" id="totp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" required>
            </div>

            <button type="submit" id="submit-btn">Sign In</button>
        </form>
    </div>

    <script>
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return btoa(String.fromCharCode.apply(null, hashArray));
        }

        async function generateToken(user, pass, totp) {
            const credentialHash = await sha256(`${user}:${pass}`);
            return `${credentialHash}:${Date.now()}:${totp}`;
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const totp = document.getElementById('totp').value;
            const token = await generateToken(user, pass, totp);
            document.cookie = `auth=${encodeURIComponent(token)}; samesite=strict`;

            const response = await fetch('/auth', {
                method: 'POST'
            }).catch(() => null);

            if (!response || !response.ok) {
                document.cookie = 'auth=; max-age=0; samesite=strict';
                const error = response ? await response.text() : null;
                alert(error || 'Unknown error.');
                btn.disabled = false;
                return;
            }

            window.location.reload();
        };
    </script>
</body>
</html>
